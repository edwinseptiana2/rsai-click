services:
  mariadb:
    image: mariadb:11
    container_name: rsai-click-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rsai_click_pwd
      MARIADB_DATABASE: rsai_click
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: rsai-click-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mariadb
      MYSQL_ROOT_PASSWORD: rsai_click_pwd
    depends_on:
      - mariadb

volumes:
  mariadb_data:
